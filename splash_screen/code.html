  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    @keyframes subtle-pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.8;
      }

      50% {
        transform: scale(1.05);
        opacity: 1;
      }
    }

    @keyframes slide-progress {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(0%);
      }
    }

    .animate-subtle-pulse {
      animation: subtle-pulse 4s ease-in-out infinite;
    }

    .animate-slide-progress {
      animation: slide-progress 3s ease-in-out infinite;
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface text-on-surface font-body overflow-hidden">

    <!-- Center Content: Logo & Visual Anchor -->

            data-alt="Close-up of a single gourmet artisanal donut with glossy dark chocolate glaze, gold leaf flakes, and sea salt on a dark brown surface with dramatic warm lighting."

        <h1 class="font-headline text-5xl md:text-7xl font-black text-primary tracking-tighter">
          Doughvana
        </h1>
        <p class="font-headline text-xl md:text-2xl italic text-on-surface-variant font-light tracking-wide opacity-90">
          Where Cravings Meet Heaven
        </p>
      </div>
    </div>
    <!-- Bottom Footer: Loading & Branding -->
    <div class="w-full max-w-xs mb-20 px-6 flex flex-col items-center space-y-8 z-10">
      <!-- Custom Loading Indicator -->
      <div class="w-full h-[3px] bg-surface-container-highest rounded-full overflow-hidden relative">
        <div class="absolute inset-0 bg-primary/30 blur-sm"></div>
        <div
          class="h-full bg-primary-container animate-slide-progress w-2/3 rounded-full shadow-[0_0_12px_rgba(208,124,48,0.6)]">

      <!-- Loading Text -->
      <span class="font-label text-[10px] uppercase tracking-[0.3em] text-primary/60 font-medium">
